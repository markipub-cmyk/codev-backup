name: Migrate R2 to S3

on:
  workflow_dispatch:
    inputs:
      folders:
        description: "Folders/prefixes to migrate — one per line or comma-separated (e.g. backups/2024/\nuploads/images/)"
        required: true
        type: string
      workers:
        description: "Parallel copy threads (default: 20)"
        required: false
        type: string
        default: "20"
      dry_run:
        description: "List objects only — do not copy to S3"
        required: false
        type: boolean
        default: false
      skip_existing:
        description: "Skip objects already present in the S3 bucket"
        required: false
        type: boolean
        default: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Migrate R2 prefix to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          args=(--workers "${{ inputs.workers }}")
          [[ "${{ inputs.dry_run }}"       == "true" ]] && args+=(--dry-run)
          [[ "${{ inputs.skip_existing }}" == "true" ]] && args+=(--skip-existing)

          # Split folders on newlines and commas, strip whitespace, skip blanks
          while IFS= read -r line; do
            IFS=',' read -ra parts <<< "$line"
            for part in "${parts[@]}"; do
              part="${part// /}"   # trim spaces
              [[ -n "$part" ]] && args+=(--prefix "$part")
            done
          done <<< "${{ inputs.folders }}"

          python scripts/mig_r2_s3.py "${args[@]}"
